<svg width="960" height="520" viewBox="0 0 960 520" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <rect x="0.5" y="0.5" width="959" height="519" rx="12" fill="#FFFFFF" stroke="#E5E3DC"/>

  <!-- Header -->
  <rect x="1" y="1" width="958" height="62" rx="12" fill="#F7F6F1"/>
  <rect x="1" y="40" width="958" height="23" fill="#F7F6F1"/>
  <line x1="1" y1="63" x2="959" y2="63" stroke="#E5E3DC"/>
  <rect x="16" y="15" width="34" height="34" rx="8" fill="#E1F5EE"/>
  <text x="33" y="37" text-anchor="middle" font-size="13" font-weight="500" fill="#0F6E56">HH</text>
  <text x="60" y="29" font-size="14" font-weight="500" fill="#1A1A18">Holistic Health Hub — Ordering</text>
  <text x="60" y="46" font-size="11" fill="#9A9A92">Connected to Curaleaf Rocky API</text>
  <text x="944" y="36" text-anchor="end" font-size="12" fill="#6B6B66">S. Patel</text>

  <!-- Tabs -->
  <text x="16" y="92" font-size="13" fill="#6B6B66">Catalogue</text>
  <text x="100" y="92" font-size="13" font-weight="500" fill="#1A1A18">Create Rx order</text>
  <rect x="100" y="102" width="98" height="2" fill="#1A1A18"/>
  <text x="216" y="92" font-size="13" fill="#6B6B66">Orders</text>
  <text x="276" y="92" font-size="13" fill="#6B6B66">Invoices</text>
  <line x1="1" y1="113" x2="959" y2="113" stroke="#E5E3DC"/>

  <!-- Step bar -->
  <rect x="1" y="114" width="958" height="37" fill="#F7F6F1"/>
  <line x1="1" y1="151" x2="959" y2="151" stroke="#E5E3DC"/>
  <circle cx="26" cy="132" r="9" fill="#E1F5EE"/><text x="26" y="136" text-anchor="middle" font-size="11" fill="#0F6E56">✓</text>
  <text x="40" y="137" font-size="12" font-weight="500" fill="#0F6E56">1. Upload prescription</text>
  <text x="196" y="137" font-size="12" fill="#9A9A92">›</text>
  <circle cx="218" cy="132" r="9" fill="#E6F1FB"/><text x="218" y="136" text-anchor="middle" font-size="11" fill="#185FA5">2</text>
  <text x="232" y="137" font-size="12" font-weight="500" fill="#1A1A18">2. Add products</text>
  <text x="338" y="137" font-size="12" fill="#9A9A92">›</text>
  <circle cx="360" cy="132" r="9" fill="#FFFFFF" stroke="#D3D1C7"/><text x="360" y="136" text-anchor="middle" font-size="11" fill="#9A9A92">3</text>
  <text x="374" y="137" font-size="12" fill="#9A9A92">3. Review &amp; submit</text>

  <!-- Column divider -->
  <line x1="620" y1="151" x2="620" y2="519" stroke="#E5E3DC"/>

  <!-- LEFT: current prescription builder -->
  <text x="16" y="178" font-size="13" font-weight="500" fill="#1A1A18">Current prescription · Rx #2</text>

  <!-- Upload chip -->
  <rect x="16" y="188" width="572" height="54" rx="8" fill="#FFFFFF" stroke="#E5E3DC"/>
  <rect x="28" y="200" width="34" height="30" rx="6" fill="#E6F1FB"/>
  <text x="45" y="220" text-anchor="middle" font-size="14" fill="#185FA5">📄</text>
  <text x="74" y="211" font-size="13" font-weight="500" fill="#1A1A18">prescription_asmith.pdf</text>
  <text x="74" y="227" font-size="11" fill="#9A9A92">238 KB · uploaded</text>
  <rect x="466" y="203" width="110" height="24" rx="8" fill="#E1F5EE"/>
  <text x="521" y="219" text-anchor="middle" font-size="12" fill="#0F6E56">✓ Copy attached</text>

  <!-- Patient / prescriber -->
  <text x="16" y="262" font-size="11" fill="#9A9A92">Patient</text>
  <rect x="16" y="268" width="278" height="32" rx="8" fill="#FFFFFF" stroke="#D3D1C7"/>
  <text x="28" y="289" font-size="12" fill="#1A1A18">A. Smith</text>
  <text x="306" y="262" font-size="11" fill="#9A9A92">Prescriber</text>
  <rect x="306" y="268" width="282" height="32" rx="8" fill="#FFFFFF" stroke="#D3D1C7"/>
  <text x="318" y="289" font-size="12" fill="#1A1A18">Dr. R. Okafor</text>

  <!-- Add products -->
  <text x="16" y="324" font-size="12" font-weight="500" fill="#6B6B66">Add prescribed products to this Rx</text>
  <rect x="16" y="332" width="572" height="34" rx="8" fill="#FFFFFF" stroke="#D3D1C7"/>
  <text x="40" y="354" font-size="13" fill="#9A9A92">Search catalogue to add to Rx #2…</text>

  <!-- Added items -->
  <rect x="16" y="378" width="572" height="70" rx="8" fill="#FFFFFF" stroke="#E5E3DC"/>
  <text x="28" y="403" font-size="13" fill="#1A1A18">Khiron 20/1 Oil 30ml ×1</text>
  <text x="544" y="403" text-anchor="end" font-size="13" fill="#1A1A18">£40.00</text>
  <text x="566" y="403" font-size="13" fill="#9A9A92">🗑</text>
  <line x1="16" y1="416" x2="588" y2="416" stroke="#E5E3DC"/>
  <text x="28" y="436" font-size="13" font-style="italic" fill="#9A9A92">Add more items prescribed on this Rx…</text>
  <text x="572" y="436" font-size="13" fill="#9A9A92">+</text>

  <!-- Add another prescription -->
  <rect x="16" y="462" width="572" height="36" rx="8" fill="#FFFFFF" stroke="#D3D1C7"/>
  <text x="302" y="485" text-anchor="middle" font-size="13" fill="#1A1A18">+ Add another prescription</text>

  <!-- RIGHT: order summary -->
  <rect x="620" y="151" width="339" height="368" fill="#F7F6F1"/>
  <text x="636" y="178" font-size="13" font-weight="500" fill="#1A1A18">This order</text>
  <text x="636" y="195" font-size="11" fill="#9A9A92">2 prescription sub-orders</text>

  <rect x="636" y="206" width="308" height="52" rx="8" fill="#FFFFFF" stroke="#E5E3DC"/>
  <text x="648" y="227" font-size="12" font-weight="500" fill="#1A1A18">Rx #1 — J. Doe</text>
  <text x="932" y="227" text-anchor="end" font-size="11" fill="#0F6E56">✓ copy attached</text>
  <text x="648" y="246" font-size="11" fill="#6B6B66">2 items · £114.00</text>

  <rect x="636" y="266" width="308" height="52" rx="8" fill="#FFFFFF" stroke="#185FA5" stroke-width="2"/>
  <text x="648" y="287" font-size="12" font-weight="500" fill="#1A1A18">Rx #2 — A. Smith</text>
  <text x="932" y="287" text-anchor="end" font-size="11" fill="#185FA5">editing</text>
  <text x="648" y="306" font-size="11" fill="#6B6B66">1 item · £40.00</text>

  <line x1="636" y1="336" x2="944" y2="336" stroke="#E5E3DC"/>
  <text x="636" y="356" font-size="13" fill="#6B6B66">Order total (cost)</text>
  <text x="944" y="356" text-anchor="end" font-size="13" font-weight="500" fill="#1A1A18">£154.00</text>
  <text x="636" y="376" font-size="11" fill="#9A9A92">All sub-orders have a copy attached</text>
  <text x="944" y="376" text-anchor="end" font-size="12" fill="#0F6E56">✓</text>

  <rect x="636" y="390" width="308" height="40" rx="8" fill="#1D9E75"/>
  <text x="790" y="415" text-anchor="middle" font-size="13" font-weight="500" fill="#FFFFFF">Submit order to suppliers</text>
  <text x="636" y="452" font-size="11" fill="#9A9A92">Suppliers review each attached prescription before</text>
  <text x="636" y="468" font-size="11" fill="#9A9A92">approving its sub-order for delivery. Submit is disabled</text>
  <text x="636" y="484" font-size="11" fill="#9A9A92">until every sub-order has a copy attached.</text>
</svg>
